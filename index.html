<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sommerfolder 2026</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: white;
      text-align: center;
    }

    .wrap {
      max-width: 1000px;
      margin: 0 auto;
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: none;
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    p {
      color: #444;
    }

    .controls {
      margin: 20px 0;
    }

    button {
      padding: 10px 18px;
      margin: 0 8px;
      border: none;
      border-radius: 8px;
      background: #1a73e8;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }

    button:disabled {
      background: #9aa0a6;
      cursor: default;
    }

    #page-info {
      font-weight: bold;
      margin: 0 12px;
      font-size: 16px;
    }

    canvas {
      max-width: 100%;
      height: auto;
      border: 1px solid #ccc;
      background: white;
      border-radius: 8px;
    }

    .download {
      margin-top: 20px;
    }

    .download a {
      display: inline-block;
      padding: 12px 20px;
      background: #34a853;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .error {
      color: #b00020;
      font-weight: bold;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1> </h1>
    <p> </p>

    <div class="controls">
      <button id="prev">← Forrige</button>
      <span id="page-info">Side 1 af ?</span>
      <button id="next">Næste →</button>
    </div>

    <canvas id="pdf-canvas"></canvas>

    <div id="error" class="error"></div>

    <div class="download">
      <a href="./Sommerfolder%202026.pdf" target="_blank">Åbn / download PDF</a>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    const pdfUrl = "./Sommerfolder%202026.pdf";

    const canvas = document.getElementById("pdf-canvas");
    const ctx = canvas.getContext("2d");
    const pageInfo = document.getElementById("page-info");
    const prevBtn = document.getElementById("prev");
    const nextBtn = document.getElementById("next");
    const errorBox = document.getElementById("error");

    let pdfDoc = null;
    let pageNum = 1;
    let pageRendering = false;
    let pageNumPending = null;
    const scale = 1.4;

    pdfjsLib.getDocument(pdfUrl).promise.then(function(pdf) {
      pdfDoc = pdf;
      renderPage(pageNum);
      updateButtons();
    }).catch(function(error) {
      errorBox.textContent = "PDF kunne ikke indlæses.";
      console.error("Fejl ved indlæsning af PDF:", error);
    });

    function renderPage(num) {
      pageRendering = true;

      pdfDoc.getPage(num).then(function(page) {
        const viewport = page.getViewport({ scale: scale });
        canvas.width = viewport.width;
        canvas.height = viewport.height;

        const renderContext = {
          canvasContext: ctx,
          viewport: viewport
        };

        const renderTask = page.render(renderContext);

        renderTask.promise.then(function() {
          pageRendering = false;
          pageInfo.textContent = "Side " + pageNum + " af " + pdfDoc.numPages;
          updateButtons();

          if (pageNumPending !== null) {
            renderPage(pageNumPending);
            pageNumPending = null;
          }
        });
      });
    }

    function queueRenderPage(num) {
      if (pageRendering) {
        pageNumPending = num;
      } else {
        renderPage(num);
      }
    }

    function updateButtons() {
      prevBtn.disabled = pageNum <= 1;
      nextBtn.disabled = !pdfDoc || pageNum >= pdfDoc.numPages;
    }

    prevBtn.addEventListener("click", function() {
      if (pageNum <= 1) return;
      pageNum--;
      queueRenderPage(pageNum);
    });

    nextBtn.addEventListener("click", function() {
      if (!pdfDoc || pageNum >= pdfDoc.numPages) return;
      pageNum++;
      queueRenderPage(pageNum);
    });
  </script>
</body>
</html>
